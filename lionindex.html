<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>TG Casino Multi-Slot</title>
    <style>
        body {
            background: #1a0f02; /* Темный фон под каньон */
            color: white;
            font-family: 'Arial', sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            margin: 0;
            overflow: hidden;
        }

        .header { margin: 20px 0; text-align: center; }
        
        /* Сетка слота 3x3 */
        .slot-machine {
            background: rgba(0,0,0,0.8);
            border: 4px solid #ffd700;
            border-radius: 15px;
            display: grid;
            grid-template-columns: repeat(3, 80px);
            grid-template-rows: repeat(3, 80px);
            gap: 10px;
            padding: 15px;
            box-shadow: 0 0 20px #ff4500;
        }

        .cell {
            background: #333;
            border-radius: 10px;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 40px;
            transition: transform 0.1s;
        }

        .win-highlight {
            background: #ffec3d !important;
            transform: scale(1.1);
            box-shadow: 0 0 15px #fff;
        }

        .controls {
            margin-top: 30px;
            display: flex;
            flex-direction: column;
            gap: 15px;
            width: 80%;
        }

        button {
            padding: 15px;
            font-size: 18px;
            font-weight: bold;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            text-transform: uppercase;
        }

        .btn-spin { background: #e91e63; color: white; }
        .btn-skin { background: #4caf50; color: white; }

        .stats { font-size: 20px; margin: 10px; color: #ffd700; }
    </style>
</head>
<body>

<div class="header">
    <h2 id="game-title">BUFFALO POWER</h2>
    <div class="stats">Balance: $<span id="balance">1000</span></div>
</div>

<div class="slot-machine" id="grid">
    <div class="cell">?</div><div class="cell">?</div><div class="cell">?</div>
    <div class="cell">?</div><div class="cell">?</div><div class="cell">?</div>
    <div class="cell">?</div><div class="cell">?</div><div class="cell">?</div>
</div>

<div class="controls">
    <button class="btn-spin" onclick="spin()">SPIN (Bet $10)</button>
    <button class="btn-skin" onclick="changeSkin()">CHANGE GAME</button>
</div>

<script>
    let balance = 1000;
    const skins = {
        buffalo: { name: "Buffalo Power", symbols: ["🦬", "🦅", "🐺", "⚡", "🔥"], color: "#4b2c20" },
        royal: { name: "Royal Coins", symbols: ["💰", "👑", "💎", "🔔", "7️⃣"], color: "#1a1a1a" },
        apple: { name: "Magic Apple", symbols: ["🍎", "👸", "🧙", "🏰", "✨"], color: "#0d2b1d" }
    };
    
    let currentSkin = 'buffalo';

    // 5 Линий выплат
    const lines = [
        [3, 4, 5], // Центр (горизонталь)
        [0, 1, 2], // Верх
        [6, 7, 8], // Низ
        [0, 4, 8], // Диагональ \
        [6, 4, 2]  // Диагональ /
    ];

    function changeSkin() {
        const keys = Object.keys(skins);
        let idx = keys.indexOf(currentSkin);
        currentSkin = keys[(idx + 1) % keys.length];
        
        document.getElementById('game-title').innerText = skins[currentSkin].name;
        document.body.style.background = skins[currentSkin].color;
    }

    function spin() {
        if (balance < 10) return alert("No money!");
        
        balance -= 10;
        updateUI();
        
        const cells = document.querySelectorAll('.cell');
        const symbols = skins[currentSkin].symbols;
        const gridResult = [];

        // Очистка подсветки
        cells.forEach(c => c.classList.remove('win-highlight'));

        // Рандом
        cells.forEach((cell, i) => {
            const randomSymbol = symbols[Math.floor(Math.random() * symbols.length)];
            cell.innerText = randomSymbol;
            gridResult.push(randomSymbol);
        });

        checkWins(gridResult, cells);
    }

    function checkWins(res, cells) {
        let winAmount = 0;
        
        lines.forEach(line => {
            if (res[line[0]] === res[line[1]] && res[line[1]] === res[line[2]]) {
                winAmount += 50; // Фиксированная выплата за линию
                line.forEach(idx => cells[idx].classList.add('win-highlight'));
            }
        });

        if (winAmount > 0) {
            balance += winAmount;
            setTimeout(() => alert("WIN: $" + winAmount), 200);
        }
        updateUI();
    }

    function updateUI() {
        document.getElementById('balance').innerText = balance;
    }
</script>

</body>
</html>
