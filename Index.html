<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Playson Premium</title>
    <style>
        body { background: #050505; color: #e0e0e0; font-family: sans-serif; margin: 0; padding: 10px; overflow: hidden; }
        .header { display: flex; justify-content: space-between; align-items: center; background: linear-gradient(180deg, #1a1a1a 0%, #000 100%); padding: 15px; border-radius: 10px; border-bottom: 2px solid #d4af37; margin-bottom: 15px; }
        .balance { color: #d4af37; font-weight: bold; font-size: 20px; }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .game-card { background: #111; border-radius: 8px; overflow: hidden; border: 1px solid #333; text-align: center; cursor: pointer; }
        .game-card img { width: 100%; height: 100px; object-fit: cover; }
        .game-card p { padding: 8px; margin: 0; font-size: 12px; font-weight: bold; color: #fff; }
        
        #game-screen { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000; z-index: 100; flex-direction: column; align-items: center; justify-content: center; }
        .slot-machine { display: flex; gap: 10px; margin: 20px; }
        .reel { width: 70px; height: 90px; background: #222; border: 2px solid #d4af37; display: flex; align-items: center; justify-content: center; font-size: 40px; border-radius: 5px; }
        .back-btn { position: absolute; top: 20px; left: 20px; color: #d4af37; text-decoration: none; font-size: 16px; font-weight: bold; }
        button { background: #d4af37; color: #000; border: none; padding: 15px 40px; font-weight: bold; border-radius: 5px; font-size: 18px; cursor: pointer; transition: 0.2s; }
        button:active { transform: scale(0.95); background: #f1c40f; }
    </style>
</head>
<body>

<div id="lobby">
    <div class="header">
        <div>
            <div style="color: #d4af37; font-size: 10px; letter-spacing: 2px;">PREMIUM</div>
            <div style="font-size: 18px; font-weight: bold;">PLAYSON</div>
        </div>
        <div class="balance"><span id="main-balance">5000</span>$</div>
    </div>

    <div class="grid">
        <div class="game-card" onclick="startGame('Royal Coins 2')">
            <img src="https://img.freepik.com/free-photo/gold-coins-background_23-2147835844.jpg">
            <p>Royal Coins 2</p>
        </div>
        <div class="game-card" onclick="startGame('Buffalo Power')">
            <img src="https://img.freepik.com/free-photo/bison-standing-field_23-2148281134.jpg">
            <p>Buffalo Power</p>
        </div>
    </div>
</div>

<div id="game-screen">
    <a href="#" class="back-btn" onclick="closeGame()">← НАЗАД</a>
    <h2 id="game-title" style="color: #d4af37;">Royal Coins 2</h2>
    <div class="slot-machine">
        <div id="r1" class="reel">🎰</div>
        <div id="r2" class="reel">🎰</div>
        <div id="r3" class="reel">🎰</div>
    </div>
    <button onclick="spin()">SPIN (50$)</button>
</div>

<script>
    let balance = 5000;
    const symbols = ['💰', '💎', '7️⃣', '🔔', '🍒'];

    function updateUI() {
        document.getElementById('main-balance').innerText = balance;
    }

    function startGame(name) {
        document.getElementById('game-title').innerText = name;
        document.getElementById('lobby').style.display = 'none';
        document.getElementById('game-screen').style.display = 'flex';
    }

    function closeGame() {
        document.getElementById('lobby').style.display = 'block';
        document.getElementById('game-screen').style.display = 'none';
        updateUI();
    }

    function spin() {
        if (balance < 50) {
            alert("Пополните баланс!");
            return;
        }

        balance -= 50;
        updateUI();

        // Рандом символов
        const r1 = symbols[Math.floor(Math.random() * symbols.length)];
        const r2 = symbols[Math.floor(Math.random() * symbols.length)];
        const r3 = symbols[Math.floor(Math.random() * symbols.length)];

        // Визуальное обновление
        document.getElementById('r1').innerText = r1;
        document.getElementById('r2').innerText = r2;
        document.getElementById('r3').innerText = r3;

        // Проверка выигрыша
        if (r1 === r2 && r2 === r3) {
            balance += 1000;
            setTimeout(() => {
                alert("🎉 WIN! +1000$");
                updateUI();
            }, 100);
        }
    }
</script>
</body>
</html>
