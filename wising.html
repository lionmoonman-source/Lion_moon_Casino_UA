<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>LION CASINO | SPACE JACKPOT</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700&display=swap');
        
        body {
            background: #000; color: #fff; font-family: 'Montserrat', sans-serif;
            margin: 0; padding: 0; overflow-x: hidden;
        }

        /* HEADER (Pragmatic Style) */
        .top-nav {
            display: flex; justify-content: space-between; align-items: center;
            padding: 10px 15px; background: #0d0d0d; border-bottom: 1px solid #333;
            position: sticky; top: 0; z-index: 1000;
        }
        .logo-area { display: flex; align-items: center; gap: 10px; color: gold; font-weight: bold; }
        .dep-btn {
            background: #ff2d55; color: #fff; border: none; padding: 8px 25px;
            border-radius: 8px; font-weight: bold; font-size: 16px; cursor: pointer;
        }

        /* ТВОЙ БАННЕР-МЕЧТА (Lion Space) */
        .main-showcase {
            width: 100%; position: relative; border-bottom: 2px solid gold;
        }
        .main-showcase img { width: 100%; display: block; object-fit: cover; }

        /* СПИСОК ПОБЕДИТЕЛЕЙ */
        .winners-line {
            background: rgba(255, 215, 0, 0.05);
            padding: 10px; font-size: 11px; text-transform: uppercase;
            border-bottom: 1px solid #222; margin-bottom: 20px; color: #ccc;
        }
        .winners-line b { color: gold; margin-right: 5px; }

        /* ИГРОВОЕ ЛОББИ (Прагматик) */
        .game-grid {
            display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px;
            padding: 0 15px; margin-bottom: 120px;
        }
        .game-card {
            background: #111; border: 1px solid #222; border-radius: 12px;
            padding: 10px; text-align: center; transition: 0.3s;
        }
        .game-card:hover { border-color: gold; transform: translateY(-5px); box-shadow: 0 5px 15px rgba(255,215,0,0.2); }
        .game-card img { width: 80%; border-radius: 50%; border: 2px solid #333; background: #000;}
        .game-card p { font-size: 10px; margin: 10px 0 0; color: #fff; font-weight: bold; text-transform: uppercase;}

        /* НИЖНЯЯ ПАНЕЛЬ С КНОПКОЙ */
        .bottom-controls {
            position: fixed; bottom: 0; width: 100%; background: #0a0a0a;
            border-top: 2px solid gold; padding: 15px 0;
            display: flex; justify-content: space-around; align-items: center; z-index: 1000;
        }
        .info-cell { text-align: left; }
        .info-cell span { display: block; font-size: 10px; color: #888; text-transform: uppercase; }
        .info-cell b { font-size: 18px; color: #00ff00; }

        .spin-btn {
            width: 80px; height: 80px; border-radius: 50%; border: 4px solid #000;
            background: linear-gradient(#ffcc00, #b8860b); color: #000;
            font-weight: bold; font-size: 16px; cursor: pointer; box-shadow: 0 0 20px gold;
        }
        .spin-btn:active { transform: scale(0.9); }
        .bet-box select { background: #000; color: gold; border: 1px solid gold; padding: 5px; border-radius: 5px;}
    </style>
</head>
<body>

    <div class="top-nav">
        <div class="logo-area"><span>❮</span> ☰ LION🦁</div>
        <button class="dep-btn">Депозит</button>
    </div>

    <div class="main-showcase">
        <img src="https://img.freepik.com/premium-photo/gold-lion-nebula-space-background_918839-2455.jpg" alt="Space Jackpot">
        </div>

    <div class="winners-line">
        <marquee behavior="scroll" direction="left">
            <b>Последний выигрыш:</b> vovan_99 - 14,500 ₴ (Magic Apple) / <b> Джекпот дня:</b> dimon_ua - 340,000 ₴ (Gates of Olympus)
        </marquee>
    </div>

    <div class="game-grid">
        <div class="game-card">
            <img src="https://free-png.ru/wp-content/uploads/2021/07/free-png.ru-502.png" alt="Crow Icon">
            <p>Вороны</p>
        </div>
        <div class="game-card">
            <img src="https://pngicon.ru/file/uploads/apple-png-icon.png" alt="Apple Icon">
            <p>Магическое Яблоко</p>
        </div>
        <div class="game-card">
            <img src="https://www.flaticon.com/free-icons/pharaoh" alt="Egypt Icon">
            <p>Солнце Египта</p>
        </div>
    </div>

    <div class="bottom-controls">
        <div class="info-cell">
            <span>Баланс</span>
            <b id="user-bal">5000.00 ₴</b>
        </div>
        
        <button class="spin-btn" onclick="startSpin()">SPIN</button>
        
        <div class="bet-box">
            <span>Ставка</span><br>
            <select id="bet-val">
                <option value="10">10.00</option>
                <option value="50">50.00</option>
                <option value="100">100.00</option>
            </select>
        </div>
    </div>

    <script>
        let balance = 5000.00;
        let isSpinning = false;

        function startSpin() {
            if(isSpinning) return;
            let bet = parseFloat(document.getElementById('bet-val').value);
            if(balance < bet) return alert("Пополни баланс!");

            isSpinning = true;
            balance -= bet;
            updateUI();

            // Имитация вращения (позже добавим реальную логику слотов Pragmatic)
            setTimeout(() => {
                let win = Math.random() > 0.8 ? bet * 5 : 0;
                balance += win;
                updateUI();
                isSpinning = false;
            }, 1000);
        }

        function updateUI() {
            document.getElementById('user-bal').innerText = balance.toFixed(2) + " ₴";
        }
    </script>
</body>
</html>
